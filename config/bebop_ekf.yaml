bebop_ekf:
  ros__parameters:

    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: false
    publish_tf: true
    predict_to_current_time: false   # ← ACTIVADO

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link_ekf
    world_frame: odom

    pose0: /bebop/position_pose
    pose0_config: [true,  true,  true,
                   true,  true,  true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_differential: false
    pose0_queue_size: 10

    ignore_initial_transient_durations: true
